<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jokenpô</title>
    <link rel="stylesheet" href="styler.css">
    <link rel="stylesheet" href="https://unpkg.com/all-animation/dist/all-animation.min.css">
</head>

<body>

    <div class="jokenpo">

        <img src="img/Jo-Ken-Po.png" alt="Logo Jokenpô" class="logo">

        <div class="area">
            <div class="pontuacao">
                <h4>VC</h4>
                <p id="pontos-jogador">0</p>
            </div>

            <div class="escolha">
                <img src="img/pedra.png" alt="Pedra" id="pedra" class="opcao">
                <img src="img/papel.png" alt="Papel" id="papel" class="opcao">
                <img src="img/tesoura.png" alt="Tesoura" id="tesoura" class="opcao">
            </div>
        </div>

        <div class="resultado-container">
            <p id="mensagem-resultado"></p>
            <button id="btn-jogar">Jogar</button>
        </div>

        <div class="area">
            <div class="pontuacao">
                <h4>PC</h4>
                <p id="pontos-maquina">0</p>
            </div>

            <div class="escolha-pc">
                <img src="img/pedra.png" alt="Pedra" id="pedra-pc" class="opcao-pc">
                <img src="img/papel.png" alt="Papel" id="papel-pc" class="opcao-pc">
                <img src="img/tesoura.png" alt="Tesoura" id="tesoura-pc" class="opcao-pc">
            </div>
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
